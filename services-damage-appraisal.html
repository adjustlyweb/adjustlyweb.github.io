<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="Damage appraisal from Adjustly — independent appraisal representation when claim disputes arise. We invoke the policy's appraisal clause and put an experienced appraiser on your side, never the insurer's.">
<title>Damage Appraisal — Adjustly</title>
<link rel="stylesheet" href="./styles.css">
<link rel="stylesheet" href="./site.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .steps { display: grid; grid-template-columns: repeat(3,1fr); gap: clamp(16px,2vw,28px); }
  @media (max-width: 760px){ .steps { grid-template-columns: 1fr; } }
  .step { position: relative; padding-top: 18px; border-top: 2px solid var(--sky-300); }
  .step__n { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--blue-500); letter-spacing: 0.08em; }
  .step h3 { font-size: var(--fs-h5); margin: 6px 0 6px; }
  .step p { color: var(--slate-600); font-size: var(--fs-sm); margin: 0; line-height: 1.5; }
</style></head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./_ds_bundle.js"></script>
<script src="./site-common.js"></script>
<script type="text/babel">
const { SiteHeader, SiteFooter, Badge, Button, FaqAccordion, DisclaimerCallout } = window.AdjustlyDesignSystem_e51731;
const A = window.ADJUSTLY;

const STEPS = [
  ['The appraisal clause is invoked','When you and the insurer disagree on the amount of a covered loss, most policies contain an appraisal clause. Either side may demand appraisal, and each party selects a competent, independent appraiser.'],
  ['Your appraiser values the loss','Your appraiser independently inspects, documents, and prepares a thorough valuation of the damage — advocating for an accurate, well-supported figure on your behalf.'],
  ['Differences are resolved','The two appraisers work to reconcile their figures. Any remaining differences are submitted to a neutral umpire, and an agreement by any two of the three sets the amount of the loss.'],
];

const WHO = [
  'Property owners whose claim amount is disputed by the insurer',
  'Owners who believe the carrier\'s valuation is too low',
  'Claims that have stalled over disagreement about the scope or cost of repairs',
  'Anyone whose policy contains an appraisal clause and faces a deadlock on amount',
  'Residential and commercial losses alike',
];

const FAQS = [
  ['What is the appraisal clause?','Many property insurance policies include an appraisal clause — a contractual process for resolving disagreements about the amount of a covered loss (not whether the loss is covered). Each side appoints an independent appraiser, and a neutral umpire resolves any remaining differences.'],
  ['What does my appraiser do for me?','Your appraiser independently inspects and documents the loss and prepares a defensible valuation that advocates for your interests. They then work with the insurer\'s appraiser, and the umpire if needed, to reach a binding determination of the amount.'],
  ['Is appraisal the same as a lawsuit?','No. Appraisal is a contractual dispute-resolution process built into the policy itself. It is generally faster and narrower than litigation and is focused specifically on the amount of the loss.'],
];

function App(){
  React.useEffect(()=>{ const t=setTimeout(()=>window.lucide&&window.lucide.createIcons(),100); return ()=>clearTimeout(t); });
  React.useEffect(()=>{ window.lucide&&window.lucide.createIcons(); });
  return (
    <div>
      <SiteHeader logoSrc={A.MARK} links={A.NAV} phone={A.PHONE} ctaLabel={A.CTA.label} ctaHref={A.CTA.href} />

      <section className="phero" id="top">
        <img className="phero__mark" src={A.MARK_WHITE} alt="" />
        <div className="phero__inner">
          <span className="phero__crumb"><a href="services.html">Services</a><i data-lucide="chevron-right" style={{width:'13px',height:'13px'}}></i> Damage Appraisal</span>
          <h1>Damage Appraisal — independent representation in a dispute.</h1>
          <p className="phero__lead">When you and your insurer can't agree on the amount of a covered loss, the policy's appraisal clause provides a path forward. We put an experienced, independent appraiser on your side of the table.</p>
          <div style={{display:'flex',gap:'10px',flexWrap:'wrap',margin:'4px 0 22px'}}>
            <Badge variant="brand" icon="scale">Independent valuation</Badge>
            <Badge variant="outline" icon="shield-check" style={{color:'#DDE8F3',borderColor:'var(--border-on-inverse)'}}>We advocate for you</Badge>
          </div>
          <div className="phero__cta">
            <Button variant="primary" size="lg" href={A.CTA.href} icon="arrow-right" iconPosition="right">Get a Free Claim Review</Button>
            <Button variant="secondary" size="lg" href="contact.html#start">Discuss an appraisal</Button>
          </div>
        </div>
      </section>

      <section className="section">
        <div className="wrap wrap--text">
          <div className="shead shead--plain"><span className="u-eyebrow">What it is</span>
            <h2>What is damage appraisal?</h2>
          </div>
          <div className="prose">
            <p>Sometimes the disagreement on a claim isn't about <em>whether</em> the loss is covered — it's about <em>how much</em> the loss is worth. Most property insurance policies anticipate this with an <strong>appraisal clause</strong>: a built-in process for resolving disputes over the amount of a covered loss.</p>
            <p>In appraisal, each side appoints its own competent, independent appraiser. Our role is to serve as <em>your</em> appraiser — inspecting, documenting, and valuing the damage thoroughly and advocating for an accurate, well-supported figure. We are independent, but we represent the policyholder's interests, never the insurer's.</p>
          </div>
        </div>
      </section>

      <section className="section section--tint">
        <div className="wrap">
          <div className="shead shead--plain"><span className="u-eyebrow">How it works</span>
            <h2>How the appraisal process unfolds.</h2>
          </div>
          <div className="steps" style={{marginTop:'24px'}}>
            {STEPS.map(([t,d],i)=>(
              <div className="step" key={i}>
                <div className="step__n">Step {String(i+1).padStart(2,'0')}</div>
                <h3>{t}</h3>
                <p>{d}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      <section className="section">
        <div className="wrap--narrow">
          <div className="shead shead--plain"><span className="u-eyebrow">Who it's for</span>
            <h2>Is appraisal representation right for you?</h2>
          </div>
          <ul className="checklist checklist--2" style={{marginTop:'8px'}}>
            {WHO.map((t,i)=>(<li key={i}><i data-lucide="user-check"></i><span>{t}</span></li>))}
          </ul>
        </div>
      </section>

      <section className="section section--tint">
        <div className="wrap--narrow">
          <div className="shead shead--plain"><span className="u-eyebrow">Common questions</span>
            <h2>Damage appraisal, explained.</h2>
          </div>
          <FaqAccordion items={FAQS.map(([q,a])=>({q,a}))} defaultOpen={[0]} />
          <div className="discrow">
            <DisclaimerCallout title="Educational, not legal advice">Adjustly represents property owners, never insurers. This page is educational and is not legal advice, and we do not guarantee any claim outcome. Whether appraisal is available depends on your specific policy language.</DisclaimerCallout>
          </div>
        </div>
      </section>

      <section className="ctaband">
        <img className="navy__mark" src={A.MARK_WHITE} alt="" />
        <div className="ctaband__inner">
          <h2>Stuck in a dispute over the amount of your loss?</h2>
          <p>Let an experienced advocate review your situation — free, with no obligation.</p>
          <div className="ctaband__cta">
            <Button variant="inverse" size="lg" href="contact.html#start" icon="arrow-right" iconPosition="right">Get a Free Claim Review</Button>
            <Button variant="secondary" size="lg" href="services-umpire.html">Learn about umpire services</Button>
          </div>
        </div>
      </section>

      <SiteFooter logoSrc={A.LOGO_WHITE} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
setTimeout(()=>window.lucide&&window.lucide.createIcons(), 140);
</script>
</body></html>
