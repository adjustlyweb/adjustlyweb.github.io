<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="Free Claim Settlement Audit — our experienced claim professionals review your insurance settlement to determine whether your claim may qualify for additional compensation. No cost, no obligation.">
<title>Free Claim Settlement Audit — Adjustly</title>
<link rel="stylesheet" href="./styles.css">
<link rel="stylesheet" href="./site.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .uploadnote { background: var(--surface-tint); border:var(--border-1); border-radius:var(--radius-md); padding:14px 16px; margin-top:14px; display:flex; gap:10px; align-items:flex-start; }
  .uploadnote i, .uploadnote svg { color: var(--blue-500); flex:none; }
  .adj-leadform--inverse .uploadnote { background: rgba(255,255,255,0.08); border-color: var(--border-on-inverse); color:#DDE8F3; }
  .adj-leadform--inverse .uploadnote svg { color: var(--sky-300); }
  .uploadnote span { font-size: var(--fs-sm); line-height:1.5; }
</style></head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./_ds_bundle.js"></script>
<script src="./site-common.js"></script>
<script type="text/babel">
const { SiteHeader, SiteFooter, TrustBar, Badge, Button, Field, DisclaimerCallout } = window.AdjustlyDesignSystem_e51731;
const A = window.ADJUSTLY;

function AuditForm(){
  return (
    <form className="adj-leadform adj-leadform--inverse" noValidate onSubmit={(e)=>{e.preventDefault(); A.submitLead(e,'New Adjustly lead — Free Claim Settlement Audit');}}>
      <div className="adj-leadform__eyebrow"><i data-lucide="file-search" aria-hidden="true"></i>Free claim settlement audit</div>
      <h3 className="adj-leadform__title">Request your free audit</h3>
      <p className="adj-leadform__sub">Already received a payment? Let's make sure you received everything you were entitled to.</p>
      <div className="adj-leadform__grid">
        <Field label="Full name" name="name" autoComplete="name" required inverse placeholder="Jordan Rivera" />
        <Field label="Phone" name="phone" type="tel" autoComplete="tel" required inverse placeholder="(555) 010-2837" />
        <div style={{gridColumn:'1 / -1'}}><Field label="Email" name="email" type="email" autoComplete="email" required inverse placeholder="you@email.com" /></div>
        <div style={{gridColumn:'1 / -1'}}><Field label="Property address" name="address" autoComplete="street-address" inverse placeholder="123 Main St, City, State ZIP" /></div>
        <Field label="Insurance carrier" name="carrier" inverse placeholder="e.g. State Farm" />
        <Field label="Claim number" name="claim_number" inverse placeholder="Optional" />
        <div style={{gridColumn:'1 / -1'}}><Field label="Date of loss" name="date_of_loss" type="date" inverse /></div>
      </div>
      <div className="uploadnote">
        <i data-lucide="paperclip" aria-hidden="true"></i>
        <span><strong>Have documents?</strong> After you submit, you'll get a reply with a secure email address — please send your insurance estimate, photos, and any insurance letters there. (Document upload is coming soon.)</span>
      </div>
      <div className="adj-leadform__actions">
        <Button type="submit" variant="inverse" size="lg" fullWidth icon="arrow-right" iconPosition="right">Submit audit request</Button>
        <p className="adj-leadform__note">Free and no obligation. This is educational and not legal advice.</p>
      </div>
    </form>
  );
}

const REVIEW = ['Insurance estimate','Contractor estimates','Repair invoices','Engineering reports','Claim photographs','Policy coverage','Adjuster notes (when available)','Repair scope','Supplemental documentation','Appraisal opportunities'];
const ANALYZE = ['Was all visible damage included?','Was hidden damage considered?','Were all policy benefits applied?','Were code upgrades addressed?','Were all rooms evaluated?','Were roofing materials correctly measured?','Was depreciation properly calculated?','Were labor costs accurate?','Were material prices updated?','Was business interruption fully evaluated?','Were all structures included?','Were additional living expenses considered?','Were ordinance and law coverages applied?','Were matching issues addressed?','Could a supplemental claim still be filed?'];
const RESID = ['Water Damage','Fire','Smoke','Storm','Roof','Wind','Hail','Frozen Pipes','Lightning','Tree Damage','Collapse','Vehicle Impact','Mold'];
const COMM = ['Apartment Complexes','Hotels','Retail','Industrial','Office Buildings','Restaurants','Churches','Schools','Warehouses','Manufacturing','Business Interruption','Large Losses'];
const WHO = ['Anyone who has already received an insurance payment','Anyone who feels their claim was underpaid','Anyone whose contractor says repairs cost more','Anyone with hidden damage','Anyone with supplemental damage','Anyone whose claim was partially denied','Business & commercial property owners','HOAs, apartment owners, and property managers'];

function App(){
  React.useEffect(()=>{ const t=setTimeout(()=>window.lucide&&window.lucide.createIcons(),100); return ()=>clearTimeout(t); });
  React.useEffect(()=>{ window.lucide&&window.lucide.createIcons(); });
  return (
    <div>
      <SiteHeader logoSrc={A.MARK} links={A.NAV} phone={A.PHONE} ctaLabel={A.CTA.label} ctaHref={A.CTA.href} />

      <section className="phero phero--split">
        <img className="phero__mark" src={A.MARK_WHITE} alt="" />
        <div className="phero__inner">
          <div>
            <span className="phero__crumb"><a href="index.html">Free Property Protection</a><i data-lucide="chevron-right" style={{width:'13px',height:'13px'}}></i> Claim Settlement Audit</span>
            <h1>Think your insurance company underpaid your claim?</h1>
            <p className="phero__lead">You may be owed more than you realize. Our experienced claim professionals perform a comprehensive settlement audit to determine whether your claim may qualify for additional compensation. No cost. No obligation.</p>
            <div style={{display:'flex',gap:'10px',flexWrap:'wrap',marginBottom:'18px'}}>
              <Badge variant="accent" icon="gift">100% free</Badge>
              <Badge variant="brand" icon="shield-check">No obligation</Badge>
              <Badge variant="outline" icon="search" style={{color:'#DDE8F3',borderColor:'var(--border-on-inverse)'}}>15-point review</Badge>
            </div>
            <TrustBar inverse bordered={false} separators items={[
              {icon:'shield-check', label:'We represent owners, not insurers'},
              {icon:'file-check', label:'Residential & commercial claims'},
            ]} />
          </div>
          <div className="formcol"><AuditForm /></div>
        </div>
      </section>

      <section className="section">
        <div className="wrap wrap--text">
          <div className="shead shead--plain"><span className="u-eyebrow">What it is</span>
            <h2>What is a Claim Settlement Audit?</h2>
          </div>
          <div className="prose">
            <p>Many homeowners assume that once the insurance company issues a payment, the claim is over. That simply isn't always true. Insurance claims are often complex — sometimes damage is overlooked, sometimes estimates are incomplete, sometimes additional covered damage is discovered later, and sometimes policy benefits were never included in the original settlement.</p>
            <p>Our Claim Settlement Audit is designed to identify these opportunities.</p>
          </div>
        </div>
      </section>

      <section className="section section--tint">
        <div className="wrap split split--even">
          <div>
            <span className="u-eyebrow">What we review</span>
            <h2 style={{marginTop:'8px'}}>Your full claim file.</h2>
            <ul className="checklist" style={{marginTop:'18px'}}>
              {REVIEW.map((t,i)=>(<li key={i}><i data-lucide="check"></i><span>{t}</span></li>))}
            </ul>
          </div>
          <div>
            <span className="u-eyebrow">We analyze</span>
            <h2 style={{marginTop:'8px'}}>Fifteen questions most settlements never answer.</h2>
            <ul className="checklist" style={{marginTop:'18px'}}>
              {ANALYZE.map((t,i)=>(<li key={i}><i data-lucide="help-circle"></i><span>{t}</span></li>))}
            </ul>
          </div>
        </div>
      </section>

      <section className="section">
        <div className="wrap split split--even">
          <div>
            <span className="u-eyebrow">Residential claims</span>
            <h2 style={{marginTop:'8px'}}>Home losses we audit.</h2>
            <div className="pills" style={{marginTop:'16px'}}>{RESID.map((t,i)=>(<span className="pill" key={i}>{t}</span>))}</div>
          </div>
          <div>
            <span className="u-eyebrow">Commercial claims</span>
            <h2 style={{marginTop:'8px'}}>Business losses we audit.</h2>
            <div className="pills" style={{marginTop:'16px'}}>{COMM.map((t,i)=>(<span className="pill" key={i}>{t}</span>))}</div>
          </div>
        </div>
      </section>

      <section className="section section--navy">
        <img className="navy__mark" src={A.MARK_WHITE} alt="" />
        <div className="wrap--narrow" style={{position:'relative'}}>
          <span className="u-eyebrow" style={{color:'var(--sky-300)'}}>If we believe you're owed more</span>
          <h2 style={{margin:'10px 0 14px'}}>We'll explain your options — honestly.</h2>
          <p style={{color:'var(--text-on-inverse-muted)',fontSize:'var(--fs-lead)',lineHeight:'1.6',maxWidth:'64ch'}}>We'll explain your available options and determine whether additional claim representation, supplemental claims, or other dispute resolution processes may be appropriate.</p>
          <p style={{color:'#DDE8F3',fontSize:'var(--fs-base)',lineHeight:'1.65',maxWidth:'64ch',marginTop:'14px'}}>Every claim is different, and no additional recovery can be guaranteed, but many property owners are surprised to learn that additional benefits may still be available depending on their policy, the facts of the loss, and applicable deadlines.</p>
        </div>
      </section>

      <section className="section section--tint">
        <div className="wrap--narrow">
          <div className="shead shead--plain"><span className="u-eyebrow">Who should request one</span>
            <h2>Is a claim audit right for you?</h2>
          </div>
          <ul className="checklist checklist--2">
            {WHO.map((t,i)=>(<li key={i}><i data-lucide="user-check"></i><span>{t}</span></li>))}
          </ul>
        </div>
      </section>

      <section className="ctaband">
        <img className="navy__mark" src={A.MARK_WHITE} alt="" />
        <div className="ctaband__inner">
          <h2>Already received a claim payment?</h2>
          <p>Let's make sure you received everything you were entitled to. Request your free Claim Settlement Audit today.</p>
          <div className="ctaband__cta">
            <Button variant="inverse" size="lg" href="#top" icon="arrow-right" iconPosition="right">Request my free audit</Button>
            <Button variant="secondary" size="lg" href="services-public-adjusting.html">See how public adjusting works</Button>
          </div>
        </div>
      </section>

      <SiteFooter logoSrc={A.LOGO_WHITE} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
setTimeout(()=>window.lucide&&window.lucide.createIcons(), 140);
</script>
</body></html>
