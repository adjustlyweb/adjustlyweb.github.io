<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- STAGING CONTAINMENT — keep this site out of every index until the Open Risk Log (CLAUDE.md §2) is cleared. -->
<meta name="robots" content="noindex, nofollow">
<title>Storm & hurricane damage claims — Adjustly</title>
<link rel="stylesheet" href="./styles.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { margin: 0; background: var(--surface-page); }
  .wrap { max-width: var(--container-wide); margin-inline: auto; padding-inline: var(--gutter); }

  /* HERO — split: copy left, sticky lead form right */
  .lhero { background: var(--navy-700); color: #fff; position: relative; overflow: hidden; }
  .lhero__mark { position:absolute; right:-120px; top:-80px; width:520px; opacity:0.06; pointer-events:none; }
  .lhero__grid { max-width: var(--container-wide); margin-inline:auto; padding: clamp(36px,4.5vw,72px) var(--gutter);
    display:grid; grid-template-columns: 1.1fr 0.9fr; gap: clamp(28px,4vw,64px); align-items:start; position:relative; }
  .lhero__crumb { font-family: var(--font-mono); font-size: var(--fs-xs); letter-spacing:0.08em; color:var(--sky-300); text-transform:uppercase; display:flex; gap:8px; align-items:center; }
  .lhero__crumb a { color: var(--sky-300); text-decoration:none; }
  .lhero h1 { color:#fff; font-size: clamp(2.4rem,1.5rem+3.6vw,4rem); margin: 16px 0 18px; max-width: 16ch; }
  .lhero__lead { color: var(--text-on-inverse-muted); font-size: var(--fs-lead); line-height:1.5; max-width: 46ch; margin:0 0 26px; }
  .lhero__trust { margin-top: 14px; }
  .formcol { position: sticky; top: 90px; }
  @media (max-width: 900px){ .lhero__grid { grid-template-columns: 1fr; } .formcol { position: static; } }

  .section { padding-block: var(--section-y); }
  .section--tint { background: var(--surface-tint); }
  .shead { margin-bottom: clamp(24px,3vw,44px); max-width: 60ch; }
  .shead h2 { margin: 10px 0 0; }
  .shead p { color: var(--slate-600); margin: 12px 0 0; }

  .covers { display:grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
  @media (max-width: 720px){ .covers { grid-template-columns: 1fr; } }

  .split { display:grid; grid-template-columns: 0.9fr 1.1fr; gap: clamp(28px,4vw,64px); align-items:start; }
  @media (max-width: 820px){ .split { grid-template-columns: 1fr; } }
  .split__aside .u-eyebrow { margin-bottom: 10px; }
  .split__aside h2 { margin: 0 0 14px; }
  .split__aside p { color: var(--slate-600); max-width: 42ch; }

  /* Inline lead-form status line (success / error / staging notice). */
  .adj-lead-status { margin: 16px 0 0; font-family: var(--font-mono); font-size: var(--fs-xs); line-height: 1.55; color: var(--blue-700); }
  .adj-leadform--inverse .adj-lead-status { color: #DDE8F3; }
</style></head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./_ds_bundle.js"></script>
<script type="text/babel">
const {
  SiteHeader, SiteFooter, TrustBar, ProcessTracker, FaqAccordion,
  SpecialtyCard, LeadForm, DisclaimerCallout, Badge, Button
} = window.AdjustlyDesignSystem_e51731;
const NAVY = './assets/logo/adjustly-logo-navy.png';
const WHITE = './assets/logo/adjustly-logo-white.png';
const MARKW = './assets/logo/adjustly-mark-white.png';

/* Web3Forms access key — PUBLIC client-side key (safe in HTML, not a secret).
   Replace the placeholder with the real key from web3forms.com to make forms deliver. */
const WEB3FORMS_KEY = '[WEB3FORMS_KEY]';

async function submitLead(e){
  const form = e.target;
  let status = form.querySelector('.adj-lead-status');
  if(!status){
    status = document.createElement('p');
    status.className = 'adj-lead-status';
    status.setAttribute('role','status');
    status.setAttribute('aria-live','polite');
    form.appendChild(status);
  }
  // Staging guard: until a real key is pasted in, don't hit the API — show a clear notice instead.
  if(WEB3FORMS_KEY.charAt(0) === '['){
    status.textContent = 'Staging preview — online submission isn’t live yet. To reach a licensed public adjuster now, please email us and we’ll respond personally.';
    return;
  }
  status.textContent = 'Sending…';
  const data = new FormData(form);                 // all input is treated as untrusted; Web3Forms sanitizes server-side
  data.append('access_key', WEB3FORMS_KEY);
  data.append('subject', 'New Adjustly lead — Storm & hurricane claim review');
  data.append('from_name', 'Adjustly Website');
  try{
    const res = await fetch('https://api.web3forms.com/submit', { method:'POST', body:data });
    const json = await res.json();
    if(json.success){
      status.textContent = 'Thank you — a licensed public adjuster will review your storm claim and reach out. No cost, no obligation.';
      form.reset();
    } else {
      status.textContent = 'Something went wrong sending your request. Please try again, or email us directly.';
    }
  }catch(err){
    status.textContent = 'Network error — please try again, or email us directly.';
  }
}

function App(){
  const [on,setOn] = React.useState(false);
  React.useEffect(()=>{ const t=setTimeout(()=>{setOn(true); window.lucide&&window.lucide.createIcons();},80); return ()=>clearTimeout(t); },[]);
  React.useEffect(()=>{ window.lucide&&window.lucide.createIcons(); });
  // Merge any base classes with the reveal class so semantic styling survives the spread.
  const r=(d, base='')=>({className:`${base?base+' ':''}adj-reveal${on?' adj-reveal--on':''}`,'data-delay':String(d)});
  return (
    <div>
      <SiteHeader logoSrc={NAVY} currentHref="#services" />
      <section className="lhero">
        <img className="lhero__mark" src={MARKW} alt="" />
        <div className="lhero__grid">
          <div>
            <span {...r(0,'lhero__crumb')}><a href="index.html">Services</a><i data-lucide="chevron-right" style={{width:'13px',height:'13px'}}></i> Storm &amp; hurricane</span>
            <h1 {...r(1)}>Storm &amp; hurricane damage claims, handled for you.</h1>
            <p {...r(2,'lhero__lead')}>Wind, hail, and named-storm losses are routinely underestimated. Our licensed adjusters and local restoration specialists document the real scope — and we never work for your insurer.</p>
            <div {...r(3)} style={{display:'flex',gap:'10px',flexWrap:'wrap'}}>
              <Badge variant="accent" icon="map-pin">Nationwide network</Badge>
              <Badge variant="brand" icon="shield-check">Owner advocates</Badge>
              <Badge variant="outline" icon="badge-check" style={{color:'#DDE8F3',borderColor:'var(--border-on-inverse)'}}>Licensed</Badge>
            </div>
            <div className="lhero__trust" {...r(4)}>
              <TrustBar inverse bordered={false} separators items={[
                {icon:'shield-check', label:'We represent owners, not insurers'},
                {icon:'hand-coins', label:'Free, no-obligation review'},
              ]} />
            </div>
          </div>
          <div className="formcol" {...r(3)}>
            <LeadForm inverse eyebrow="Free claim review" title="Get your storm claim reviewed" subtitle="Tell us what the storm did. A licensed adjuster will review it free." submitLabel="Request my free review" onSubmit={submitLead} />
          </div>
        </div>
      </section>

      <section className="section">
        <div className="wrap">
          <div className="shead"><span className="u-eyebrow">What's covered</span>
            <h2>Storm losses we document and value.</h2>
            <p>If a storm caused it, we can help you substantiate it. Common storm-related damage includes:</p>
          </div>
          <div className="covers">
            <SpecialtyCard icon="wind" title="Wind & roof damage" tag="Most common">Lifted shingles, torn membranes, and structural movement that insurers often miss.</SpecialtyCard>
            <SpecialtyCard icon="cloud-hail" title="Hail impact">Bruising and fracturing on roofing, siding, gutters, and HVAC units.</SpecialtyCard>
            <SpecialtyCard icon="droplets" title="Wind-driven water">Interior water intrusion from compromised roofs, windows, and flashing.</SpecialtyCard>
            <SpecialtyCard icon="trees" title="Fallen trees & debris">Impact damage to structures, fences, and outbuildings across the property.</SpecialtyCard>
          </div>
        </div>
      </section>

      <section className="section section--tint">
        <div className="wrap split">
          <div className="split__aside">
            <span className="u-eyebrow">How a storm claim works</span>
            <h2>Three steps, and we carry the weight.</h2>
            <p>From the first photo to the final settlement, you have a licensed advocate on your side of the table.</p>
            <div style={{marginTop:'22px'}}><Button variant="primary" href="#" icon="arrow-right" iconPosition="right">Start my storm claim</Button></div>
          </div>
          <ProcessTracker current={0} steps={[
            {eyebrow:'Step 01', title:'Protect & document', desc:'Stabilize the property and capture the full extent of the storm damage before anything is repaired or discarded.', icon:'shield'},
            {eyebrow:'Step 02', title:'Prepare the claim', desc:'We measure, value, and substantiate the loss — including the hidden damage adjusters routinely overlook.', icon:'file-text'},
            {eyebrow:'Step 03', title:'Recover what you\'re owed', desc:'We present and negotiate the claim with your insurer and advocate until it is resolved.', icon:'circle-check'},
          ]} />
        </div>
      </section>

      <section className="section">
        <div className="wrap" style={{maxWidth:'820px'}}>
          <div className="shead"><span className="u-eyebrow">Storm claim FAQ</span><h2>Questions after a storm.</h2></div>
          <FaqAccordion defaultOpen={[0]} items={[
            {q:'The insurer already sent an adjuster — do I still need you?', a:'The insurer\'s adjuster works for the insurer. A public adjuster works for you. Having your own licensed advocate document and value the loss helps ensure the full scope of storm damage is represented.'},
            {q:'How soon after a storm should I call?', a:'As soon as it is safe. Documenting before repairs and before debris is cleared matters, and many policies limit how long you have to act.'},
            {q:'What if my storm claim was already denied or underpaid?', a:'We review the existing file and prepare your case for re-evaluation. A denial is not always the end of the process.'},
          ]} />
          <div style={{marginTop:'28px'}}>
            <DisclaimerCallout title="Educational, not legal advice">Adjustly's licensed public adjusters represent property owners, never insurers. This page is educational and is not legal advice, and we do not guarantee any claim outcome.</DisclaimerCallout>
          </div>
        </div>
      </section>

      <SiteFooter logoSrc={WHITE} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
setTimeout(()=>window.lucide&&window.lucide.createIcons(), 140);
</script>
</body></html>
