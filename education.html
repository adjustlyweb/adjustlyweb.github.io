<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="Adjustly Education Center — plain-English guides on your right to representation, replacement cost vs. actual cash value, depreciation, the appraisal process, and what to do after a loss. Educational, not legal advice.">
<title>Education Center — Adjustly</title>
<link rel="stylesheet" href="./styles.css">
<link rel="stylesheet" href="./site.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .rescards { display: grid; grid-template-columns: 1fr 1fr; gap: var(--grid-gap); }
  @media (max-width: 760px){ .rescards { grid-template-columns: 1fr; } }
  .rescard { background:#fff; border:var(--border-1); border-left:4px solid var(--gold-500,#C9A227); border-radius:var(--radius-lg); padding:clamp(24px,2.4vw,34px); display:flex; flex-direction:column; box-shadow:var(--shadow-sm); }
  .rescard__ico { width:42px; height:42px; border-radius:var(--radius-md); background:var(--surface-tint); display:flex; align-items:center; justify-content:center; color:var(--blue-500); margin-bottom:14px; }
  .rescard__ico svg { width:22px; height:22px; }
  .rescard h3 { margin:0 0 8px; }
  .rescard p { color:var(--slate-600); font-size:var(--fs-base); margin:0 0 20px; flex:1; }
</style></head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./_ds_bundle.js"></script>
<script src="./site-common.js"></script>
<script type="text/babel">
const { SiteHeader, SiteFooter, TrustBar, ArticleCard, Badge, Button, DisclaimerCallout } = window.AdjustlyDesignSystem_e51731;
const A = window.ADJUSTLY;

const ARTICLES = [
  ['Claims','Public adjuster vs. insurance adjuster: who works for whom','The most important distinction in your claim — who each adjuster actually answers to, and why it changes everything.','5 min read'],
  ['Coverage','Replacement Cost vs. Actual Cash Value explained','Two ways your loss can be valued, and how the difference can mean thousands of dollars on the same claim.','7 min read'],
  ['Coverage','How depreciation works in a property claim','Why insurers subtract for age and wear — and how recoverable depreciation may be paid back to you.','6 min read'],
  ['Guide','What to do in the first 48 hours after water damage','Document first, mitigate second, call your adjuster third — in that order, and why the order matters.','6 min read'],
  ['Disputes','How the insurance appraisal process works','When you and your insurer disagree on the amount of a loss, appraisal is a path forward. Here is how it unfolds.','8 min read'],
  ['Before a loss','Reading your homeowners policy before storm season','The four sections that quietly decide what you are actually owed when the wind picks up.','8 min read'],
];

function App(){
  React.useEffect(()=>{ const t=setTimeout(()=>window.lucide&&window.lucide.createIcons(),100); return ()=>clearTimeout(t); });
  React.useEffect(()=>{ window.lucide&&window.lucide.createIcons(); });
  return (
    <div>
      <SiteHeader logoSrc={A.LOGO_NAVY} links={A.NAV} phone={A.PHONE} ctaLabel={A.CTA.label} ctaHref={A.CTA.href} />

      <section className="phero">
        <img className="phero__mark" src={A.MARK_WHITE} alt="" />
        <div className="phero__inner">
          <span className="phero__crumb"><a href="index.html">Home</a><i data-lucide="chevron-right" style={{width:'13px',height:'13px'}}></i> Education Center</span>
          <h1>Learn before you need us.</h1>
          <p className="phero__lead">One of Adjustly's core missions is education. The more you understand the claims process, the better protected you are — whether you ever become a client or not.</p>
          <div style={{display:'flex',gap:'10px',flexWrap:'wrap',marginBottom:'18px'}}>
            <Badge variant="brand" icon="book-open">Plain-English guides</Badge>
            <Badge variant="outline" icon="graduation-cap" style={{color:'#DDE8F3',borderColor:'var(--border-on-inverse)'}}>Education-first</Badge>
          </div>
          <TrustBar inverse bordered={false} separators items={[
            {icon:'shield', label:'We represent owners, not insurers'},
            {icon:'check', label:'Educational, not legal advice'},
          ]} />
        </div>
      </section>

      <section className="section">
        <div className="wrap wrap--text">
          <div className="shead shead--plain"><span className="u-eyebrow">Why we publish this</span>
            <h2>Most property owners never learn how claims really work — until they're in one.</h2>
          </div>
          <div className="prose">
            <p>Most property owners don't know they have the legal right to their own representation. They don't know exactly what their policy covers, how a claim is valued, how depreciation works, or what "replacement cost" really means. They've never had a reason to learn how business interruption is calculated, how supplemental claims work, what hidden damage looks like, how the appraisal process unfolds, or when an engineering report changes a claim — and they've rarely had the difference between an insurance company's adjuster and a public adjuster explained plainly.</p>
            <p>That's the gap this Education Center exists to close. Start with the guides below, then reach out whenever you'd like to talk to a licensed advocate. No cost, no obligation.</p>
          </div>
        </div>
      </section>

      <section className="section section--tint">
        <div className="wrap">
          <div className="shead">
            <div className="shead__num">01</div>
            <div className="shead__txt"><span className="u-eyebrow">Guides & explainers</span>
              <h2>Start with the fundamentals.</h2>
              <p>Short, practical reads that demystify the parts of a claim insurers rarely explain.</p>
            </div>
          </div>
          <div className="grid grid-3">
            {ARTICLES.map(([cat,title,excerpt,rt],i)=>(
              <ArticleCard key={i} category={cat} title={title} excerpt={excerpt} readTime={rt} markSrc={A.MARK} href="article.html" />
            ))}
          </div>
        </div>
      </section>

      <section className="section">
        <div className="wrap">
          <div className="shead">
            <div className="shead__num">02</div>
            <div className="shead__txt"><span className="u-eyebrow">Free downloads</span>
              <h2>Two resources worth keeping.</h2>
              <p>Print them, save them, or keep them on your phone. Both are completely free.</p>
            </div>
          </div>
          <div className="rescards">
            <div className="rescard">
              <div className="rescard__ico"><i data-lucide="clipboard-list"></i></div>
              <h3>Property Damage Emergency Checklist</h3>
              <p>The exact first-48-hours steps to take after a loss — keep yourself safe, stop further damage, and protect your claim before you ever call your insurer.</p>
              <Button variant="primary" href="resource-emergency-checklist.html" icon="download">Open the checklist</Button>
            </div>
            <div className="rescard">
              <div className="rescard__ico"><i data-lucide="camera"></i></div>
              <h3>Insurance Claim Documentation Guide</h3>
              <p>How to photograph, inventory, and log everything so your documentation tells the full story of your loss — the way a thorough claim file should.</p>
              <Button variant="primary" href="resource-documentation-guide.html" icon="download">Open the guide</Button>
            </div>
          </div>
        </div>
      </section>

      <section className="section section--tint">
        <div className="wrap--narrow">
          <DisclaimerCallout title="Educational, not legal advice">The Education Center is provided for general information only. It represents property owners' interests, never insurers, and it is not legal advice. Every policy and loss is different, and we do not guarantee any claim outcome.</DisclaimerCallout>
        </div>
      </section>

      <section className="ctaband">
        <img className="navy__mark" src={A.MARK_WHITE} alt="" />
        <div className="ctaband__inner">
          <h2>Have a question the guides didn't answer?</h2>
          <p>Talk it through with a licensed public adjuster. We'll explain your options honestly — free, with no obligation.</p>
          <div className="ctaband__cta">
            <Button variant="inverse" size="lg" href={A.CTA.href} icon="arrow-right" iconPosition="right">Get a free claim review</Button>
            <Button variant="secondary" size="lg" href="risk-assessment.html">Schedule a property assessment</Button>
          </div>
        </div>
      </section>

      <SiteFooter logoSrc={A.LOGO_WHITE} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
setTimeout(()=>window.lucide&&window.lucide.createIcons(), 140);
</script>
</body></html>
