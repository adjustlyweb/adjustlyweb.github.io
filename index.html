<style>
  /* BRAND WORDMARK BAND (homepage, directly below sticky header) */
  .brandband { background: var(--surface-page); border-bottom: 1px solid var(--line-200); text-align: center;
    padding: clamp(10px,1.4vw,16px) var(--gutter); }
  .brandband__name { font-family: var(--font-display); font-weight: var(--fw-display); color: var(--navy-900);
    font-size: clamp(1.45rem,1.2rem+1vw,1.9rem); line-height: 1; letter-spacing: -0.01em;
    font-variation-settings: "opsz" 36; margin: 0; }
  .brandband__sub { font-family: var(--font-sans); color: var(--navy-700); font-size: var(--fs-xs);
    text-transform: uppercase; letter-spacing: var(--ls-eyebrow); margin: 5px 0 0; opacity: 0.9; }

  /* HERO (homepage-specific) */
  .hero { position: relative; overflow: hidden; background: var(--navy-900); border-bottom: var(--border-1); isolation: isolate; }
  .hero__media { position: absolute; inset: 0; z-index: 0; background: var(--navy-900); }
  /* Four stacked media layers (2 stills + 2 videos). Crossfade via opacity; the incoming layer
     is raised above the outgoing (is-front) so there is no navy dip between clips. All layers sit
     below the navy scrim (::after, z-index:2) and the headline grid. */
  .hero__layer { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: 80% 50%; display: block; z-index: 0; opacity: 0; }
  .hero__still { transition: opacity .8s ease; }
  .hero__vid   { transition: opacity 1s ease; }
  .hero__layer.is-active { opacity: 1; }
  .hero__layer.is-front  { z-index: 1; }
  .hero__media::after { content: ""; position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background:
      linear-gradient(96deg, rgba(11,37,69,0.95) 0%, rgba(11,37,69,0.88) 22%, rgba(11,37,69,0.66) 44%, rgba(11,37,69,0.34) 64%, rgba(11,37,69,0.12) 82%, rgba(11,37,69,0.03) 100%),
      linear-gradient(0deg, rgba(11,37,69,0.42) 0%, rgba(11,37,69,0) 40%); }
  .hero__grid { position: relative; z-index: 1; max-width: var(--container-wide); margin-inline: auto; padding: clamp(40px,6vw,92px) var(--gutter) clamp(48px,6vw,96px);
    display: grid; grid-template-columns: 1fr 1fr; gap: clamp(28px,4vw,64px); align-items: center; }
  .hero__eyebrow { color: var(--sky-300); }
  .hero h1 { font-size: calc(var(--fs-display) * 0.65); margin: 18px 0 22px; color: #fff; text-shadow: 0 1px 28px rgba(11,37,69,0.5); }
  .hero__lead { max-width: 48ch; margin-bottom: 30px; color: #D7E3F0; font-size: calc(var(--fs-lead) * 0.7); }
  .hero__cta { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .hero .adj-btn--secondary { border-color: rgba(255,255,255,0.55); color: #fff; }
  .hero .adj-btn--secondary:hover { background: #fff; color: var(--navy-700); border-color: #fff; }
  .hero__micro { margin-top: 22px; font-family: var(--font-mono); font-size: var(--fs-xs); color: #AFC3DA; letter-spacing: 0.03em; display:flex; align-items:center; gap:8px; }
  .hero__micro svg { width: 15px; height: 15px; color: var(--sky-300); }
  .crisis { position: relative; justify-self: start; max-width: 360px; background: var(--navy-700); border-radius: var(--radius-lg); padding: clamp(24px,2.4vw,34px);
    color: #fff; overflow: hidden; box-shadow: var(--shadow-lg); border: 1px solid var(--border-on-inverse); }
  .crisis__mark { position: absolute; right: -70px; top: -40px; width: 320px; opacity: 0.08; pointer-events: none; }
  .crisis__eyebrow { font-family: var(--font-mono); font-size: var(--fs-xs); letter-spacing: var(--ls-eyebrow); text-transform: uppercase; color: var(--sky-300); display:flex; align-items:center; gap:8px; }
  .crisis__eyebrow svg { width: 15px; height: 15px; }
  .crisis h2 { color: #fff; font-size: var(--fs-h3); margin: 14px 0 8px; position: relative; }
  .crisis p { color: var(--text-on-inverse-muted); position: relative; margin: 0 0 20px; font-size: var(--fs-base); }
  .crisis__steps { position: relative; display:flex; flex-direction:column; gap: 12px; margin-bottom: 24px; }
  .crisis__step { display:flex; gap:12px; align-items:flex-start; }
  .crisis__num { font-family: var(--font-mono); font-size: 12px; color: var(--navy-900); background: var(--sky-500); width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;font-weight:600;margin-top:1px; }
  .crisis__step span:last-child { font-size: var(--fs-sm); color: #DDE8F3; line-height:1.4; }

  /* Three Ways We Help */
  .ways { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--grid-gap); }
  @media (max-width: 880px){ .ways { grid-template-columns: 1fr; } }
  .way { background: #fff; border: var(--border-1); border-radius: var(--radius-lg); padding: clamp(24px,2.4vw,34px); display: flex; flex-direction: column; box-shadow: var(--shadow-sm); }
  .way__tag { font-family: var(--font-mono); font-size: var(--fs-xs); letter-spacing: var(--ls-eyebrow); text-transform: uppercase; color: var(--blue-500); }
  .way h3 { margin: 10px 0 8px; }
  .way p { color: var(--slate-600); font-size: var(--fs-base); margin: 0 0 20px; flex: 1; }

  .services-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--grid-gap); }
  @media (max-width: 900px){ .services-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 600px){ .services-grid { grid-template-columns: 1fr; } }
  .articles { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--grid-gap); }
  @media (max-width: 900px){ .articles { grid-template-columns: 1fr 1fr; } .articles > *:last-child { display:none; } }
  @media (max-width: 600px){ .articles { grid-template-columns: 1fr; } .articles > *:last-child { display:block; } }

  /* 8-step process grid */
  .steps { display: grid; grid-template-columns: repeat(4,1fr); gap: clamp(16px,2vw,28px); }
  @media (max-width: 900px){ .steps { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 520px){ .steps { grid-template-columns: 1fr; } }
  .step { position: relative; padding-top: 18px; border-top: 2px solid var(--sky-300); }
  .section--navy .step { border-top-color: rgba(91,164,214,0.45); }
  .step__n { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--blue-500); letter-spacing: 0.08em; }
  .section--navy .step__n { color: var(--sky-300); }
  .step h3 { font-size: var(--fs-h5); margin: 6px 0 0; }

  .leadcta { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(28px,4vw,72px); align-items: center; }
  .leadcta__copy .u-eyebrow { color: var(--sky-300); }
  .leadcta__copy h2 { color: #fff; margin: 16px 0 16px; }
  .leadcta__copy p { color: var(--text-on-inverse-muted); max-width: 46ch; margin: 0 0 24px; }
  /* TRUST BAND — institutional navy band that continues the hero (proof points + reach + license verify) */
  .trustband { background: var(--navy-900); color: #fff; position: relative; overflow: hidden;
    margin-top: -1px; border-top: 1px solid rgba(201,162,39,0.40); }
  .trustband__inner { max-width: var(--container-wide); margin-inline: auto;
    padding: clamp(26px,3.4vw,48px) var(--gutter);
    display: flex; flex-direction: column; align-items: center; gap: clamp(18px,2.4vw,28px); }
  .trustband .adj-trustbar { justify-content: center; }
  .trustband__rule { width: min(240px, 64%); height: 1px; border: 0; margin: 0;
    background: linear-gradient(90deg, transparent, rgba(201,162,39,0.55), transparent); }
  .trustband__reach { font-family: var(--font-display); font-weight: var(--fw-display); color: #fff;
    font-size: clamp(1.15rem, 1rem + 0.85vw, 1.6rem); line-height: 1.3; letter-spacing: -0.01em;
    text-align: center; max-width: 38ch; margin: 0; font-variation-settings: "opsz" 32; }
  .trustband__verify { display: inline-flex; align-items: center; gap: 9px;
    font-family: var(--font-sans); font-size: var(--fs-sm); font-weight: 500; line-height: 1.35;
    color: #fff; text-decoration: none; text-align: left;
    padding: 11px 18px; border-radius: var(--radius-md);
    border: 1px solid var(--gold-500, #C9A227); background: rgba(201,162,39,0.07);
    transition: background var(--dur-fast) var(--ease-out), border-color var(--dur-fast); }
  .trustband__verify:hover { background: rgba(201,162,39,0.15); border-color: #D9B94A; }
  .trustband__verify svg { width: 17px; height: 17px; color: var(--gold-500, #C9A227); flex: none; }
  @media (max-width: 560px){
    .trustband__verify { font-size: var(--fs-xs); padding: 10px 14px; align-items: flex-start; }
    .trustband__verify svg { margin-top: 1px; }
  }
  .verify-link { display:inline-flex; align-items:center; gap:6px; margin-top:14px; font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--sky-300); text-decoration: none; }
  .verify-link:hover { text-decoration: underline; }
  .verify-link svg { width: 14px; height: 14px; }
  @media (max-width: 820px){ .leadcta { grid-template-columns: 1fr; } }

  @media (max-width: 860px){
    .hero__grid { grid-template-columns: 1fr; }
    .hero__media > img, .hero__media > video { object-position: 70% 50%; }
    .hero__media::after { background: linear-gradient(180deg, rgba(11,37,69,0.82) 0%, rgba(11,37,69,0.9) 100%); }
    .crisis { order: 2; justify-self: stretch; max-width: none; }
  }
</style></head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./_ds_bundle.js"></script>

<script type="text/babel">
const {
  SiteHeader, SiteFooter, TrustBar, FaqAccordion,
  ServiceCard, ArticleCard, Button, LeadForm, DisclaimerCallout, LicenseBadge
} = window.AdjustlyDesignSystem_e51731;
const A = window.ADJUSTLY;
const POSTER_RES = './assets/img/kitchen-hero-poster.jpg';
const POSTER_COM = './assets/img/commercial-hero-poster.jpg';
const VIDEO_RES  = './assets/video/kitchen-hero.mp4';
const VIDEO_COM  = './assets/video/commercial-hero.mp4';

function Hero(){
  const [on,setOn] = React.useState(false);
  const resStill = React.useRef(null), comStill = React.useRef(null);
  const resVid   = React.useRef(null), comVid   = React.useRef(null);
  React.useEffect(()=>{ const t=setTimeout(()=>setOn(true),60); return ()=>clearTimeout(t); },[]);
  const r = (d, base='')=>({ className:`${base?base+' ':''}adj-reveal${on?' adj-reveal--on':''}`, 'data-delay':String(d) });

  // Device/motion-aware hero background. Pure DOM/classList control (no React re-render):
  //  • reduced-motion → residential still only, no video, no mp4 loaded
  //  • ≤900px (mobile) → crossfade the two stills, never request an mp4
  //  • >900px (desktop) → crossfade residential ↔ commercial video, loop, pause when tab hidden
  React.useEffect(()=>{
    const RS=resStill.current, CS=comStill.current, RV=resVid.current, CV=comVid.current;
    if(!RS||!CS||!RV||!CV) return;
    const FADE_STILL=800, HOLD_STILL=4000, VID_FADE=1000, TAIL=1.0; // TAIL = seconds before clip end
    let timers=[], interval=null, desktopCleanup=null;
    const clearTimers=()=>{ timers.forEach(clearTimeout); timers=[]; if(interval){clearInterval(interval); interval=null;} };

    // Raise `inc` above `out` and fade it in; once covered, drop `out`. Only `inc` animates → no dip.
    const swap=(inc,out,fadeMs)=>{
      inc.classList.add('is-front','is-active');
      timers.push(setTimeout(()=>{ if(out){ out.classList.remove('is-active','is-front'); } }, fadeMs));
    };
    const reset=()=>{
      clearTimers();
      if(desktopCleanup){ desktopCleanup(); desktopCleanup=null; }
      [RS,CS,RV,CV].forEach(el=>el.classList.remove('is-active','is-front'));
      RS.classList.add('is-active','is-front');          // residential still is the resting base
      [RV,CV].forEach(v=>{ try{ v.pause(); }catch(e){} });
    };

    const startMobile=()=>{
      RV.removeAttribute('src'); CV.removeAttribute('src'); // guarantee zero mp4 network requests
      let showingRes=true;
      interval=setInterval(()=>{
        if(document.hidden) return;
        if(showingRes) swap(CS,RS,FADE_STILL); else swap(RS,CS,FADE_STILL);
        showingRes=!showingRes;
      }, HOLD_STILL+FADE_STILL);
    };

    const startDesktop=()=>{
      RV.muted=true; CV.muted=true;
      let switching=false;
      const play=v=>{ const p=v.play(); if(p&&p.catch)p.catch(()=>{}); };
      if(RV.getAttribute('src')!==VIDEO_RES) RV.src=VIDEO_RES;
      const onResReady=()=>swap(RV,RS,VID_FADE);          // fade video in over the still once it paints
      RV.addEventListener('playing', onResReady, {once:true});
      RV.currentTime=0; play(RV);

      const toCom=()=>{
        if(switching || !RV.duration || RV.currentTime < RV.duration-TAIL) return;
        switching=true;
        if(CV.getAttribute('src')!==VIDEO_COM) CV.src=VIDEO_COM;
        CV.currentTime=0; play(CV);
        const go=()=>{ swap(CV,RV,VID_FADE);
          timers.push(setTimeout(()=>{ try{RV.pause();RV.currentTime=0;}catch(e){} switching=false; }, VID_FADE)); };
        if(CV.readyState>=2) go(); else CV.addEventListener('playing', go, {once:true});
      };
      const toRes=()=>{
        if(switching || !CV.duration || CV.currentTime < CV.duration-TAIL) return;
        switching=true;
        RV.currentTime=0; play(RV);
        swap(RV,CV,VID_FADE);
        timers.push(setTimeout(()=>{ try{CV.pause();CV.currentTime=0;}catch(e){} switching=false; }, VID_FADE));
      };
      RV.addEventListener('timeupdate', toCom);
      CV.addEventListener('timeupdate', toRes);
      const onVis=()=>{ if(document.hidden){ try{RV.pause();}catch(e){} try{CV.pause();}catch(e){} }
        else { play(CV.classList.contains('is-active')?CV:RV); } };
      document.addEventListener('visibilitychange', onVis);
      desktopCleanup=()=>{
        RV.removeEventListener('timeupdate', toCom); CV.removeEventListener('timeupdate', toRes);
        RV.removeEventListener('playing', onResReady); document.removeEventListener('visibilitychange', onVis);
      };
    };

    const reduceMQ=window.matchMedia('(prefers-reduced-motion: reduce)');
    const mobileMQ=window.matchMedia('(max-width: 900px)');
    const apply=()=>{
      reset();
      if(reduceMQ.matches){ RV.removeAttribute('src'); CV.removeAttribute('src'); return; } // still only
      if(mobileMQ.matches){ startMobile(); return; }
      startDesktop();
    };
    apply();

    let rt=null;
    const onResize=()=>{ clearTimeout(rt); rt=setTimeout(apply,200); };
    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', onResize);
    const mqChange=()=>apply();
    if(reduceMQ.addEventListener){ reduceMQ.addEventListener('change',mqChange); mobileMQ.addEventListener('change',mqChange); }
    return ()=>{
      clearTimers();
      if(desktopCleanup) desktopCleanup();
      window.removeEventListener('resize', onResize);
      window.removeEventListener('orientationchange', onResize);
      clearTimeout(rt);
      if(reduceMQ.removeEventListener){ reduceMQ.removeEventListener('change',mqChange); mobileMQ.removeEventListener('change',mqChange); }
    };
  },[]);

  return (
    <section className="hero" id="top">
      <div className="hero__media">
        <img ref={resStill} className="hero__layer hero__still hero__still--res is-active is-front"
             src={POSTER_RES} alt="Smoke- and water-damaged kitchen with a fire-scorched laundry-room doorway" aria-hidden="true" />
        <img ref={comStill} className="hero__layer hero__still hero__still--com"
             src={POSTER_COM} alt="" aria-hidden="true" />
        <video ref={resVid} className="hero__layer hero__vid hero__vid--res" muted playsInline preload="auto"
               data-src={VIDEO_RES} aria-hidden="true" tabIndex={-1}></video>
        <video ref={comVid} className="hero__layer hero__vid hero__vid--com" muted playsInline preload="none"
               data-src={VIDEO_COM} aria-hidden="true" tabIndex={-1}></video>
      </div>
      <div className="hero__grid">
        <div>
          <span {...r(0,'u-eyebrow hero__eyebrow')}>Commercial · Residential</span>
          <h1 {...r(1)}>Property Damage Happens. Don't Face Your Insurance Company Alone.</h1>
          <p {...r(2,'u-lead hero__lead')}>Adjustly helps homeowners, business owners, and commercial property owners maximize their insurance claim recovery — through experienced public adjusters, damage appraisers, umpires, and a nationwide network of restoration professionals. We represent property owners, never insurance companies.</p>
          <div {...r(3,'hero__cta')}>
            <Button variant="primary" size="lg" href={A.CTA.href} icon="arrow-right" iconPosition="right">Get a Free Claim Review</Button>
            <Button variant="secondary" size="lg" href="risk-assessment.html">Schedule a Property Consultation</Button>
          </div>
          <div {...r(4,'hero__micro')}><i data-lucide="badge-check"></i>Licensed public adjusters · Free, no-obligation review</div>
        </div>
        <div className={`crisis adj-reveal${on?' adj-reveal--on':''}`} data-delay="3">
          <img className="crisis__mark" src={A.MARK_WHITE} alt="" />
          <span className="crisis__eyebrow"><i data-lucide="life-buoy"></i>Just had a loss?</span>
          <h2>Start here.</h2>
          <p>Take three steps now — we'll take it from there.</p>
          <div className="crisis__steps">
            <div className="crisis__step"><span className="crisis__num">1</span><span>Make sure everyone is safe and stop further damage if you can.</span></div>
            <div className="crisis__step"><span className="crisis__num">2</span><span>Photograph and video everything before you move or discard it.</span></div>
            <div className="crisis__step"><span className="crisis__num">3</span><span>Talk to a licensed adjuster before you speak with your insurer.</span></div>
          </div>
          <Button variant="inverse" size="md" fullWidth href={A.CTA.href} icon="phone">Talk to an adjuster now</Button>
        </div>
      </div>
    </section>
  );
}

const BENEFITS = [
  ['We work exclusively for you','Unlike the insurance company\'s adjuster, a public adjuster represents only the policyholder.'],
  ['Maximize your settlement','Proper documentation, estimating, and policy interpretation often uncover benefits many property owners never knew existed.'],
  ['Understand your coverage','Insurance policies can be hundreds of pages long. We help explain your rights, responsibilities, and available coverages.'],
  ['Save time','Claims can consume hundreds of hours. We manage much of the paperwork, inspections, documentation, and negotiations.'],
  ['Reduce stress','Recovering from property damage is difficult enough. Experienced advocates let you focus on your family or business.'],
  ['Professional documentation','We prepare detailed damage reports, estimates, inventories, and supporting documentation required for proper claim evaluation.'],
  ['Expert negotiation','We negotiate directly with insurance carriers to pursue a fair resolution based on the policy.'],
  ['Business interruption expertise','Commercial clients often have significant income losses beyond physical damage. We help identify and document these complex claims.'],
  ['Hidden damage investigation','Many losses involve damage that isn\'t immediately visible. Proper inspections can identify issues that may otherwise go unnoticed.'],
  ['Policy interpretation','Insurance language is technical. We help identify applicable coverages, endorsements, and claim provisions.'],
  ['Faster claim resolution','Proper organization and communication often help streamline the claims process.'],
  ['Accurate estimating','Using professional estimating software and industry standards, we prepare detailed repair estimates.'],
  ['Appraisal representation','When disputes arise, our network includes experienced damage appraisers and umpires to assist in the appraisal process where appropriate.'],
  ['Nationwide experience','Our professionals have handled residential and commercial claims across multiple states.'],
  ['Peace of mind','Knowing experienced professionals are protecting your interests provides confidence during one of life\'s most stressful events.'],
];

const PROCESS = [
  'Schedule your free consultation','Property inspection','Policy review','Damage documentation',
  'Claim preparation','Insurance company negotiation','Settlement resolution','Restoration support',
];

function App(){
  React.useEffect(()=>{ const t=setTimeout(()=>window.lucide&&window.lucide.createIcons(),120); return ()=>clearTimeout(t); });
  return (
    <div>
      <SiteHeader logoSrc={A.MARK} links={A.NAV} phone={A.PHONE} ctaLabel={A.CTA.label} ctaHref={A.CTA.href} />
      {/* Brand wordmark band — wording matches the logo lockup exactly */}
      <div className="brandband">
        <p className="brandband__name">Adjustly</p>
        <p className="brandband__sub">Property Damage Advocacy Group</p>
      </div>
      <Hero/>

      {/* TRUST BAND — institutional navy band continuing the hero */}
      <section className="trustband">
        <div className="trustband__inner">
          <TrustBar inverse center bordered={false} items={[
            {icon:'badge-check', label:'Licensed PA Public Adjuster #1289230'},
            {icon:'users', label:'Second-Generation Family of Adjusters'},
            {icon:'map-pin', label:'Nationwide Network'},
            {icon:'hand-coins', label:'Free, No-Obligation Review'},
          ]} />
          <hr className="trustband__rule" />
          {/* [VERIFY before public] — "47 states" is a regulated licensing claim; confirm the exact
              count of states with active licensure / network coverage with counsel before going public.
              The principal license below (#1289230, PA) is real and publicly verifiable. */}
          <p className="trustband__reach">Throughout our advocacy group, we have licensed professionals in 47 states across the United States.</p>
          <a className="trustband__verify" href={A.LICENSE.verifyUrl} target="_blank" rel="noopener">
            <i data-lucide="shield-check"></i>Verify our principal license #{A.LICENSE.number} ({A.LICENSE.label}) at the PA Insurance Department
          </a>
        </div>
      </section>

      {/* THREE WAYS WE HELP */}
      <section className="section section--tint" id="how">
        <div className="wrap">
          <div className="shead">
            <div className="shead__num">01</div>
            <div className="shead__txt"><span className="u-eyebrow">Protect · Prepare · Recover</span>
              <h2>Three ways we help property owners.</h2>
              <p>Every other public adjuster says "call us after you have damage." Adjustly is with you before the loss, during the claim, and after the insurer has already paid.</p>
            </div>
          </div>
          <div className="ways">
            <div className="way">
              <span className="way__tag">Before the loss</span>
